<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>POS Móvil - Dark</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>Gestión Plus</h1>
      <div class="subtitle">POS Móvil</div>
    </header>

    <!-- Mensajes -->
    <div id="mensaje" class="mensaje hidden"></div>

    <!-- Buscador -->
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Buscar producto..." autocomplete="off">
    </div>

    <!-- Lista de productos -->
    <div id="productosContainer" class="productos-grid">
      <div class="loading">Cargando productos...</div>
    </div>

    <!-- Carrito flotante mejorado CON BOTONES -/+ -->
<div class="carrito-flotante" id="carritoFlotante">
  <div class="carrito-header" onclick="toggleCarrito()">
    <div class="carrito-resumen">
      <span class="carrito-items" id="totalItems">0 productos</span>
      <span class="carrito-total" id="totalPrecio">$0</span>
    </div>
    <span class="carrito-icono" id="carritoIcono">▼</span>
  </div>
  
  <div class="carrito-contenido" id="carritoContenido">
    <!-- Lista de productos en el carrito -->
    <ul class="carrito-lista" id="carritoLista"></ul>
    
    <!-- Formulario de pago -->
    <div class="pago-form">
      <div class="input-group">
        <label>Efectivo ($)</label>
        <input type="number" id="efectivo" min="0" step="1" value="0" placeholder="0">
      </div>
      
      <div class="input-group">
        <label>Transferencia ($)</label>
        <input type="number" id="transferencia" min="0" step="1" value="0" placeholder="0">
      </div>
      
      <div class="total-pagar">
        <span>Total:</span>
        <span id="totalPagar">$0</span>
      </div>
      
      <button class="btn-pagar" id="btnPagar" disabled>Pagar</button>
    </div>
  </div>
</div>
<script src="/js/app.js"></script>
 
</body>
</html>
